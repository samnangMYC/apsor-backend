spring:
  application:
    name: apsor

  datasource:
    # In-memory DB for tests (PostgreSQL compatibility mode)
    url: jdbc:h2:mem:apsordb_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ✅ OPTIONAL: if you don't want Keycloak/OAuth2 involved in tests,
  # exclude security auto-configs so the app starts without contacting an issuer.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

server:
  # random port in tests to avoid conflicts
  port: 0
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    whitelabel:
      enabled: false

# Keep your custom props but avoid unresolved ${ENV_VAR} in tests
keycloak:
  base-url: http://localhost:18080
  realm: test
  public-client-id: test-client
  client-id: test-client
  client-secret: test-secret

app:
  frontend:
    verify-redirect-uri: "http://localhost"
  auth:
    cookie-secure: false
    cookie-same-site: "Lax"
    cookie-domain: localhost

logging:
  level:
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.security.oauth2.server.resource: INFO
    org.springframework.web: INFO